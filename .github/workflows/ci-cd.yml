name: CI-CD

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]

env:
  IMAGE_NAME: datnguyen10102004/videod

jobs:

  # ========================
  # 🧪 CI: BUILD + PUSH IMAGE
  # ========================
  build:
    runs-on: ubuntu-latest

    outputs:
      image_tag: ${{ steps.vars.outputs.tag }}

    steps:
      - uses: actions/checkout@v3

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Generate image tag
        id: vars
        run: echo "tag=${GITHUB_SHA}" >> $GITHUB_OUTPUT

      - name: Build jar
        run: mvn clean package -DskipTests

      - name: Login DockerHub
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u ${{ secrets.DOCKER_USERNAME }} --password-stdin

      - name: Build Docker image
        run: |
          docker build -t $IMAGE_NAME:${{ steps.vars.outputs.tag }} .

      - name: Push Docker image
        run: |
          docker push $IMAGE_NAME:${{ steps.vars.outputs.tag }}

  # ========================
  # 🚀 CD: DEPLOY (VPN)
  # ========================
  deploy:
    runs-on: self-hosted
    needs: build

    steps:
      - uses: actions/checkout@v3

      - name: Set IMAGE_TAG env
        run: echo "IMAGE_TAG=${{ needs.build.outputs.image_tag }}" >> $GITHUB_ENV

      - name: Login DockerHub
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u ${{ secrets.DOCKER_USERNAME }} --password-stdin

      - name: Deploy with docker-compose
        run: docker compose up -d
        env:
          DO_ACCESS_KEY_ID: ${{ secrets.DO_ACCESS_KEY_ID }}
          DO_SECRET_KEY: ${{ secrets.DO_SECRET_KEY }}
          GG_CLIENT_ID: ${{ secrets.GG_CLIENT_ID }}
          GG_CLIENT_SECRET: ${{ secrets.GG_CLIENT_SECRET }}