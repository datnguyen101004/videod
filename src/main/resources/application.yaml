spring:
  application:
    name: MovieD
  datasource:
    url: jdbc:mysql://localhost:3306/videod?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Ho_Chi_Minh&useLegacyDatetimeCode=false
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
  servlet:
    multipart:
      max-file-size: 500MB
      max-request-size: 1000MB
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GG_CLIENT_ID}
            client-secret: ${GG_CLIENT_SECRET}


do:
  space:
    bucket: videod
    region: sgp1
    url: ${DO_STORAGE_URL}
    access_key: ${DO_ACCESS_KEY_ID}
    secret_key: ${DO_SECRET_KEY}

jwt:
  secret-key: 'Y0doaGJXNW5kWGxsYm5SaGRHUmhkR0YwZEhReU1ESTBMakU9'
  expiredAccess: '4h'
  expiredRefresh: '1d'