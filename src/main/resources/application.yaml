spring:
  application:
    name: MovieD
  datasource:
    url: jdbc:mysql://localhost:3306/videod?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Ho_Chi_Minh&useLegacyDatetimeCode=false
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
  servlet:
    multipart:
      max-file-size: 200MB
      max-request-size: 200MB

do:
  space:
    name: videod
    region: sgp1
    url: ${DO_STORAGE_URL}
    access_key: ${DO_ACCESS_KEY_ID}
    secret_key: ${DO_SECRET_KEY}
