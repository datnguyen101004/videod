version: '3'

services:
  db:
    image: mysql
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      interval: 10s
      retries: 5
    restart: unless-stopped
    container_name: db-videod
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: videod
    ports:
      - "3307:3306"
    networks:
      - videod_network
    volumes:
      - videod_data:/var/lib/mysql

  app:
    image: datnguyen10102004/videod:${IMAGE_TAG:-latest}
    container_name: videod-be
    ports:
      - '8080:8080'
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/videod
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      DO_ACCESS_KEY_ID: ${DO_ACCESS_KEY_ID}
      DO_SECRET_KEY: ${DO_SECRET_KEY}
      GG_CLIENT_ID: ${GG_CLIENT_ID}
      GG_CLIENT_SECRET: ${GG_CLIENT_SECRET}
      FE_URL: ${FE_URL}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    networks:
      - videod_network

  prometheus:
    image: prom/prometheus
    container_name: prometheus
    ports:
      - "9090:9090"
    networks:
      - videod_network
    depends_on:
      - app
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    restart: unless-stopped

  grafana:
    image: grafana/grafana
    ports:
      - "3030:3000"
    networks:
      - videod_network
    depends_on:
      - prometheus
    restart: unless-stopped
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning

  redis:
    image: redis:7
    container_name: redis_videod
    ports:
      - "6379:6379"
    restart: unless-stopped
    networks:
      - videod_network
    volumes:
      - redis_videod_data:/data

volumes:
  videod_data:
  grafana_data:
  prometheus_data:
  redis_videod_data:

networks:
  videod_network:
    driver: bridge
